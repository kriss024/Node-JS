<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Node.JS Calculator</title>

    <!-- Custom styles for this template -->
    <link href="page.css" rel="stylesheet">
  </head>
  <body class="text-center">
    <main class="form-signin">
	  	<h2>Node.JS Calculator</h2>
		  <p>Please enter the value in the field</p>

			<div class="form-floating">
			  <div class="input-group">
			    <input id="input" type="text" class="form-control" aria-label="With textarea">
			  </div>
		  </div>

			<div class="form-floating">
				<p id="result">?</p>
		  </div>

			<div class="form-floating">
			  <button type="button" class="btn btn-outline-primary btn-space" onclick="add()">+</button>
			  <button type="button" class="btn btn-outline-primary btn-space" onclick="subtr()">-</button>
			  <button type="button" class="btn btn-outline-primary btn-space" onclick="multi()">*</button>
			  <button type="button" class="btn btn-outline-primary btn-space" onclick="div()">/</button>
			  <button type="button" class="btn btn-success btn-space" onclick="equals()">=</button>
			</div>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
 		<script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"> </script>

    <!-- Optional JavaScript; choose one of the two! -->
    <script>
			var x, y;

			const input = document.getElementById("input");
			input.addEventListener('input', updateValue);

			function updateValue(event){
				x = Number(event.target.value);
			}

			function init() {
			$.get("/init", function(data) {
				x = data.init_x;
				y = data.init_y;
				document.getElementById("result").innerText = y;
				input.value = y;
			});
			}
			init();

			function add() {
			$.post("/add",
				{ x: x, y: y },
			function (data, status) {
				y = data.result;
				document.getElementById("result").innerText = y;
			});
			}

			function subtr() {
			$.post("/subtr",
				{ x: x, y: y },
			function (data, status) {
				y = data.result;
				document.getElementById("result").innerText = y;
			});
			}

			function multi() {
			$.post("/multi",
				{ x: x, y: y },
			function (data, status) {
				y = data.result;
				document.getElementById("result").innerText = y;
			});
			}

			function div() {
			$.post("/div",
				{ x: x, y: y },
			function (data, status) {
				y = data.result;
				document.getElementById("result").innerText = y;
			});
			}

			function equals() {
			$.post("/result",
				{ x: x, y: y },
			function (data, status) {
				y = data.result;
				x = y;
				document.getElementById("result").innerText = y;
				input.value = y;
			});
			}

    </script>

  </body>
</html>
