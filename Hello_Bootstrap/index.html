<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">

    <title>Hello, world!</title>
  </head>
  <body>
    <div class="container">
      <h1>HTML DOM Events</h1>
      <h2>The onclick Event</h2>
      <p>The onclick event triggers a function when an element is clicked on.</p>
      <p>Click to trigger a function that will output "Hello, world!":</p>
      <button type="button" class="btn btn-outline-primary" onclick="onclick_button()">Click me</button>
      <button type="button" id="alert" class="btn btn-primary">Alert</button>
      <button type="button" id="notify" class="btn btn-success">Notify</button>
      <button type="button" id="karl" class="btn btn-light">Karl</button>
      <button type="button" id="addy" class="btn btn-dark">Addy</button>
      <p id="demo"></p>
    </div>

    <!-- Option 1: jQuery and Bootstrap Bundle (includes Popper) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>

    <!-- Optional JavaScript; choose one of the two! -->
    <script>
      let button_onclick = false;
      let count_click = 0;
      const str1 = 'Hello, world!, ';
  
        function onclick_button() {
          count_click += 1;
          if (button_onclick) {
            document.getElementById("demo").innerHTML = "";
            button_onclick = false;
          } else {
            document.getElementById("demo").innerHTML = str1 + count_click.toString();
            button_onclick = true;
          }
        }

        $("#alert").on("click", function() {
          alert("Handler for click called.");
        });

        function notify() {
          alert("Notify!");
        }

        $("#notify").on("click", notify);

        function greet(event) {
          alert("Hello " + event.data.name);

        }

        $("#karl").on("click", {
          name: "Karl"
        }, greet );

        $("#addy").on("click", {
          name: "Addy"
        }, greet );

        </script>

  </body>
</html>
