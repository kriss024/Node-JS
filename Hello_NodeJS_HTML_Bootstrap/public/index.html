<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Element Object</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">

    <style>
    .container-margin {
      margin-top: 50px;
      margin-bottom: 100px;
      margin-right: 100px;
      margin-left: 100px;
    }
    </style>

  </head>
  <body>

    <div class="container container-margin">

      <h1>The Element Object</h1>
      <h2>The addEventListener() Method</h2>
      <p>Execute a function when a user clicks on a button:</p>

      <button id="button_click" class="btn btn-outline-primary btn-space">Click Me!</button>
      <p id="demo">

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>

    <script>
      const element = document.getElementById("button_click");
      element.addEventListener("click", button_click_fun);

      let show = false;
      function button_click_fun() {
        if (show===false) {
            document.getElementById("demo").innerHTML = "<h4>Fancy display heading <small class='text-muted'>With faded secondary text</small></h4>";
            show = true;
        } else {
            document.getElementById("demo").innerHTML = "";
            show = false;
        } 
      }
    </script>
    
  </body>
</html>
